<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مساعدك الدراسي — Arabic AI Tutor</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&family=IBM+Plex+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f12;
    --surface: #18181f;
    --surface2: #22222c;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --accent: #7c6af7;
    --accent2: #5d4de6;
    --accent-soft: rgba(124,106,247,0.15);
    --text: #f0effe;
    --text2: #9b98b8;
    --text3: #5a5870;
    --green: #4ade80;
    --green-soft: rgba(74,222,128,0.12);
    --font: 'IBM Plex Sans Arabic', sans-serif;
    --radius: 16px;
    --radius-sm: 8px;
    --radius-xs: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ─── Header ─── */
  header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: var(--accent-soft);
    border: 1px solid rgba(124,106,247,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .logo-name { font-size: 16px; font-weight: 600; color: var(--text); }
  .logo-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }

  .status-pill {
    display: flex; align-items: center; gap: 6px;
    background: var(--green-soft);
    border: 1px solid rgba(74,222,128,0.2);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--green);
    direction: ltr;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ─── Subject bar ─── */
  .subject-bar {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 6px;
    overflow-x: auto;
    flex-shrink: 0;
    background: var(--surface);
    scrollbar-width: none;
  }

  .subject-bar::-webkit-scrollbar { display: none; }

  .subj-btn {
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-family: var(--font);
    font-weight: 400;
    white-space: nowrap;
    cursor: pointer;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text2);
    transition: all 0.2s;
  }

  .subj-btn:hover { border-color: var(--accent); color: var(--text); }

  .subj-btn.active {
    background: var(--accent-soft);
    border-color: rgba(124,106,247,0.5);
    color: #c4bcff;
  }

  /* ─── Chat area ─── */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--surface2) transparent;
  }

  /* Welcome state */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    text-align: center;
    padding: 40px 20px;
    gap: 16px;
    animation: fadeUp 0.4s ease;
  }

  .welcome-icon {
    width: 64px; height: 64px;
    border-radius: 18px;
    background: var(--accent-soft);
    border: 1px solid rgba(124,106,247,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 30px;
    margin-bottom: 8px;
  }

  .welcome h2 { font-size: 22px; font-weight: 600; color: var(--text); }
  .welcome p { font-size: 14px; color: var(--text2); line-height: 1.7; max-width: 280px; }

  .suggestion-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    width: 100%;
    max-width: 360px;
    margin-top: 8px;
  }

  .suggestion {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 12px;
    color: var(--text2);
    cursor: pointer;
    text-align: right;
    transition: all 0.2s;
    line-height: 1.5;
  }

  .suggestion:hover {
    border-color: var(--accent);
    color: var(--text);
    background: var(--accent-soft);
  }

  /* ─── Messages ─── */
  .msg { display: flex; gap: 10px; animation: fadeUp 0.3s ease; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 32px; height: 32px;
    border-radius: 10px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }

  .msg.bot .msg-avatar {
    background: var(--accent-soft);
    border: 1px solid rgba(124,106,247,0.3);
  }

  .msg.user .msg-avatar {
    background: var(--surface2);
    border: 1px solid var(--border2);
  }

  .msg-bubble {
    max-width: 82%;
    padding: 12px 15px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.75;
  }

  .msg.bot .msg-bubble {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 4px 16px 16px 16px;
    color: var(--text);
  }

  .msg.user .msg-bubble {
    background: var(--accent);
    border-radius: 16px 4px 16px 16px;
    color: #fff;
    text-align: right;
  }

  .msg-bubble .subject-tag {
    display: inline-block;
    font-size: 10px;
    background: var(--accent-soft);
    color: #c4bcff;
    border-radius: 4px;
    padding: 1px 7px;
    margin-bottom: 6px;
    direction: rtl;
  }

  /* Typing indicator */
  .typing-dots {
    display: flex; gap: 4px; align-items: center;
    padding: 4px 0;
  }

  .typing-dots span {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text3);
    animation: bounce 1.2s infinite;
  }

  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* ─── Input area ─── */
  .input-area {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 8px 10px;
    transition: border-color 0.2s;
  }

  .input-row:focus-within { border-color: rgba(124,106,247,0.5); }

  #user-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: var(--font);
    font-size: 14px;
    color: var(--text);
    resize: none;
    min-height: 24px;
    max-height: 120px;
    line-height: 1.6;
    direction: rtl;
  }

  #user-input::placeholder { color: var(--text3); }

  .send-btn {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    opacity: 0.5;
  }

  .send-btn.ready { opacity: 1; }
  .send-btn.ready:hover { background: var(--accent2); transform: scale(1.05); }
  .send-btn.ready:active { transform: scale(0.97); }

  .send-btn svg { width: 16px; height: 16px; }

  .input-hint {
    font-size: 11px;
    color: var(--text3);
    text-align: center;
    margin-top: 8px;
    direction: ltr;
  }

  /* ─── Error ─── */
  .error-bubble {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.25);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-size: 13px;
    color: #fca5a5;
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">📚</div>
    <div>
      <div class="logo-name">مساعدك الدراسي</div>
      <div class="logo-sub">AI Tutor · KSA Curriculum</div>
    </div>
  </div>
  <div class="status-pill">
    <div class="status-dot"></div>
    متصل
  </div>
</header>

<div class="subject-bar">
  <button class="subj-btn active" data-subject="الرياضيات" onclick="setSubject(this)">📐 الرياضيات</button>
  <button class="subj-btn" data-subject="العلوم" onclick="setSubject(this)">🔬 العلوم</button>
  <button class="subj-btn" data-subject="اللغة العربية" onclick="setSubject(this)">📖 اللغة العربية</button>
  <button class="subj-btn" data-subject="اللغة الإنجليزية" onclick="setSubject(this)">🌍 الإنجليزية</button>
  <button class="subj-btn" data-subject="التربية الإسلامية" onclick="setSubject(this)">☪️ التربية الإسلامية</button>
  <button class="subj-btn" data-subject="الفيزياء" onclick="setSubject(this)">⚛️ الفيزياء</button>
  <button class="subj-btn" data-subject="الكيمياء" onclick="setSubject(this)">🧪 الكيمياء</button>
</div>

<div class="chat-area" id="chat">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">🎓</div>
    <h2>أهلاً بك!</h2>
    <p>أنا مساعدك الدراسي الذكي. اسألني أي سؤال في المنهج السعودي وسأشرح لك خطوة بخطوة.</p>
    <div class="suggestion-grid">
      <div class="suggestion" onclick="useSuggestion(this)">كيف أحل المعادلة التربيعية؟</div>
      <div class="suggestion" onclick="useSuggestion(this)">اشرح لي قانون نيوتن الثاني</div>
      <div class="suggestion" onclick="useSuggestion(this)">ما هي أنواع الجمل في اللغة العربية؟</div>
      <div class="suggestion" onclick="useSuggestion(this)">ساعدني في فهم الكسور</div>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <button class="send-btn" id="send-btn" onclick="sendMessage()" title="إرسال">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
    <textarea id="user-input" placeholder="اكتب سؤالك هنا..." rows="1" onkeydown="handleKey(event)" oninput="handleInput()"></textarea>
  </div>
  <div class="input-hint">Powered by Claude AI · اضغط Enter للإرسال</div>
</div>

<script>
let currentSubject = 'الرياضيات';
let isLoading = false;
const history = [];

function setSubject(btn) {
  document.querySelectorAll('.subj-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentSubject = btn.dataset.subject;
}

function handleInput() {
  const ta = document.getElementById('user-input');
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
  const btn = document.getElementById('send-btn');
  btn.classList.toggle('ready', ta.value.trim().length > 0);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function useSuggestion(el) {
  document.getElementById('user-input').value = el.textContent;
  handleInput();
  sendMessage();
}

function hideWelcome() {
  const w = document.getElementById('welcome');
  if (w) w.remove();
}

function addMessage(role, content) {
  hideWelcome();
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatarChar = role === 'bot' ? '🤖' : '👤';
  div.innerHTML = `
    <div class="msg-avatar">${avatarChar}</div>
    <div class="msg-bubble">
      ${role === 'bot' ? `<span class="subject-tag">${currentSubject}</span><br>` : ''}
      <span class="msg-text"></span>
    </div>`;

  chat.appendChild(div);
  div.querySelector('.msg-text').textContent = content;
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function addTyping() {
  hideWelcome();
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing';
  div.innerHTML = `
    <div class="msg-avatar">🤖</div>
    <div class="msg-bubble">
      <div class="typing-dots"><span></span><span></span><span></span></div>
    </div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  isLoading = true;
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').classList.remove('ready');

  addMessage('user', text);
  history.push({ role: 'user', content: text });

  addTyping();

  // ======================================================
  // مفتاح Gemini المجاني — غيّر هذا بمفتاحك من:
  // https://aistudio.google.com/apikey
  // ======================================================
  const GEMINI_KEY = 'AIzaSyB0AYo67M5djzViBFzbeG3jNY-g1pdCRZA';

  const systemPrompt = `أنت مساعد تعليمي ذكي متخصص في المنهج الدراسي السعودي.
اسمك "مساعدك الدراسي".
المادة الحالية: ${currentSubject}.
قواعد مهمة:
- أجب دائماً باللغة العربية الفصحى البسيطة
- اشرح الإجابة خطوة بخطوة بشكل واضح
- استخدم أمثلة من الحياة اليومية السعودية
- إذا كان السؤال رياضياً، اكتب الخطوات بشكل مرقم
- كن مشجعاً وإيجابياً مع الطالب
- اجعل الإجابة مختصرة وواضحة (لا تتجاوز 250 كلمة)
- لا تذكر أنك Gemini أو من صنعك`;

  // بناء المحادثة بصيغة Gemini
  const geminiContents = history.map(m => ({
    role: m.role === 'assistant' ? 'model' : 'user',
    parts: [{ text: m.content }]
  }));

  try {
    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          systemInstruction: { parts: [{ text: systemPrompt }] },
          contents: geminiContents,
          generationConfig: { maxOutputTokens: 1024, temperature: 0.7 }
        })
      }
    );

    const data = await response.json();
    removeTyping();

    // إذا في خطأ من Gemini نبيّنه بوضوح
    if (data.error) {
      throw new Error('Gemini: ' + data.error.message);
    }

    const reply = data?.candidates?.[0]?.content?.parts?.[0]?.text;
    if (reply) {
      history.push({ role: 'assistant', content: reply });
      addMessage('bot', reply);
    } else {
      throw new Error('لا يوجد رد من Gemini');
    }
  } catch (err) {
    removeTyping();
    const chat = document.getElementById('chat');
    const errDiv = document.createElement('div');
    errDiv.className = 'error-bubble';
    // نبيّن الخطأ الحقيقي للمساعدة في التشخيص
    errDiv.textContent = 'خطأ: ' + (err.message || 'تأكد من مفتاح Gemini وحاول مرة أخرى');
    chat.appendChild(errDiv);
    history.pop();
  }

  isLoading = false;
  document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
}
</script>
</body>
</html>
